  - heading "Síntesis" [level=2] [ref=f5e137]
  - paragraph [ref=f5e138]:
    - text: Kiro y SDD Model no son equivalentes — operan en capas distintas. Kiro optimiza la
    - strong [ref=f5e139]: velocidad y la experiencia
    - text: del desarrollador; SDD Model garantiza que el proceso sea
    - strong [ref=f5e140]: auditable y reproducible
    - text: . No son necesariamente excluyentes.
  - paragraph [ref=f5e141]: "La pregunta estratégica es: ¿qué dimensión es no negociable para esta empresa? Si la respuesta es velocidad de adopción y experiencia de usuario, Kiro lidera. Si la respuesta es trazabilidad auditable, control soberano del proceso y ausencia de lock-in de plataforma, SDD Model lidera."
  - paragraph [ref=f5e142]: En contextos donde ambas dimensiones importan, la Opción C (combinación) es viable, pero requiere trabajo de integración inicial y claridad sobre cuál artefacto es la fuente de verdad del proceso.
  - generic [ref=f5e143]:
