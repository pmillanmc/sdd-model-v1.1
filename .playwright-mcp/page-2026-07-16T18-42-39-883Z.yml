      - generic [ref=f2e211]:
        - heading "Common Questions" [level=2] [ref=f2e212]
        - generic [ref=f2e214]:
          - generic [ref=f2e215]:
            - heading [level=3] [ref=f2e216]:
              - button "How does Kiro pricing work?" [ref=f2e217] [cursor=pointer]
            - generic [ref=f2e223]:
              - heading [level=3] [ref=f2e224]: How does Kiro pricing work?
              - generic [ref=f2e225]: Kiro offers flexible pricing tiers designed around how developers use Kiro. New users can start with the perpetual Kiro Free tier, which includes 50 credits. The Free Tier includes access to open weight models and Claude Sonnet 4.6, with limits. You can upgrade to paid tiers ranging from Pro ($20/month), Pro+ ($40/month), Pro Max ($100/month), to Power ($200/month) for increased capacity. Paid tiers for individuals allow purchasing add-on credits to continue using Kiro beyond plan limits. Plans for teams include flexible overages available at $0.04 per additional credit. Kiro prices shown do not include applicable taxes or duties (such as VAT or sales tax) unless explicitly noted. Note that if you have a Japanese billing address, Japanese Consumption Tax will apply to your Kiro usage. The amount of tax collected depends on many factors, including, but not limited to, your Tax Registration Number ("TRN" or Tax ID), and billing address. Kiro in GovCloud pricing is approximately 20% higher than commercial pricing and does not include the Free tier. Kiro processes paid subscriptions on the 1st day of each calendar month.
          - generic [ref=f2e226]:
            - heading [level=3] [ref=f2e227]:
              - button "Which models does Kiro use under the hood?" [ref=f2e228] [cursor=pointer]
            - generic [ref=f2e234]:
              - heading [level=3] [ref=f2e235]: Which models does Kiro use under the hood?
              - generic [ref=f2e236]: By default, your prompts are processed by Auto, an agent that uses a mix of different frontier models such as Sonnet 4.5, combined with specialized models that are experts in specific tasks, intent detection, caching, and other techniques to give you a better balance of quality, latency, and costs. You can also choose to have your prompts processed exclusively by Sonnet 4.5, Sonnet 4.6, Haiku 4.5, Opus 4.5, Opus 4.6, or Opus 4.7.
          - generic [ref=f2e237]:
            - heading [level=3] [ref=f2e238]:
              - button "How does the sign-up bonus work?" [ref=f2e239] [cursor=pointer]
            - generic [ref=f2e245]:
              - heading [level=3] [ref=f2e246]: How does the sign-up bonus work?
              - generic [ref=f2e247]: "The first time you upgrade to any Kiro paid plan, you get $20 credited towards your subscription when using Kiro as an individual via social login or Builder ID (not AWS Identity Center). Upgrading to a paid subscription requires a valid credit card. Kiro processes paid subscriptions on the 1st day of each calendar month. Let’s assume you first upgrade to a Kiro Pro plan ($20/month) on the 15th of June, for example, here’s how the sign-up bonus would work for you: you’d get credited $20 * 15/30 days left in June, which is $10. on July 1st, your card would get charged for (July subscription price) - (remaining free trial credit), which is $20 - ($20 * 15/30) = $10."
          - generic [ref=f2e248]:
            - heading [level=3] [ref=f2e249]:
              - button "What is a credit?" [ref=f2e250] [cursor=pointer]
            - generic [ref=f2e256]:
              - heading [level=3] [ref=f2e257]: What is a credit?
              - generic [ref=f2e258]: A credit is a unit of work in response to user prompts. Simple prompts can consume less than 1 credit. More complex prompts, such as executing a spec task, typically cost more than 1 credit. Additionally, different models consume credits at different rates, with a prompt executed via Sonnet 4.6 costing more credits than executing it with Auto. For example, a given task that consumes X credits to execute in Auto, will cost you 1.3X credits to execute via Sonnet 4.6. Credits are metered to the second decimal point, so the least number of credits a task can consume is 0.01 credits.
          - generic [ref=f2e259]:
            - heading [level=3] [ref=f2e260]:
              - button "What can I use credits for?" [ref=f2e261] [cursor=pointer]
            - generic [ref=f2e267]:
              - heading [level=3] [ref=f2e268]: What can I use credits for?
              - generic [ref=f2e269]: Any prompt you ask Kiro to execute, whether in vibe mode or spec mode, as well as spec refinement, task execution, and agent hook execution, will consume credits.
          - generic [ref=f2e270]:
            - heading [level=3] [ref=f2e271]:
              - button "How can I track my credit usage?" [ref=f2e272] [cursor=pointer]
            - generic [ref=f2e278]:
              - heading [level=3] [ref=f2e279]: How can I track my credit usage?
              - generic [ref=f2e280]: You can see the monthly credit limits for your plan, the number of credits used, and credits remaining in your subscription dashboard accessible in the Kiro IDE. Credit usage is updated at least every 5 minutes.
          - generic [ref=f2e281]:
            - heading [level=3] [ref=f2e282]:
              - button "Can I buy more credits?" [ref=f2e283] [cursor=pointer]
            - generic [ref=f2e289]:
              - heading [level=3] [ref=f2e290]: Can I buy more credits?
              - generic [ref=f2e291]: "Yes — how it works depends on whether you're on an individual or team plan: **Individual plans (Pro, Pro+, Pro Max, Power):** Purchase add-on credits to continue working. Credits cost $0.04 each, are billed immediately when you buy a pack, and you control exactly how much extra capacity to add. Packs range from $5 (125 credits) to $100. Unused add-on credits roll over and expire 12 months from the date of purchase. See [Add-on credits](/docs/billing/add-on-credits/) for details. **Team plans (Enterprise):** Admins can enable overages so users keep working past their limits automatically. Additional usage is billed at $0.04 per credit at month-end based on usage beyond the plan allocation. Overages are disabled by default and must be enabled in the Kiro console settings."
          - generic [ref=f2e292]:
            - heading [level=3] [ref=f2e293]:
              - button "Can I share my Kiro subscription with my team?" [ref=f2e294] [cursor=pointer]
            - generic [ref=f2e300]:
              - heading [level=3] [ref=f2e301]: Can I share my Kiro subscription with my team?
              - generic [ref=f2e302]: No, subscriptions and usage limits are calculated per individual user. For team usage, each developer needs their own subscription. Team billing and management features are coming soon.
          - generic [ref=f2e303]:
            - heading [level=3] [ref=f2e304]:
              - button "With which tools can I use my Kiro subscription?" [ref=f2e305] [cursor=pointer]
            - generic [ref=f2e311]:
              - heading [level=3] [ref=f2e312]: With which tools can I use my Kiro subscription?
              - generic [ref=f2e313]: "Kiro subscriptions can be used with Kiro IDE, Kiro CLI, Kiro on the web, ACP compatible IDEs, and automation in software development (ex: reviews during CI/CD). Use with OpenClaw and similar tools that leverage third-party harnesses is prohibited."
          - generic [ref=f2e314]:
            - heading [level=3] [ref=f2e315]:
              - button "What happens if I don’t use all my monthly credits?" [ref=f2e316] [cursor=pointer]
            - generic [ref=f2e322]:
              - heading [level=3] [ref=f2e323]: What happens if I don’t use all my monthly credits?
              - generic [ref=f2e324]: Usage limits reset at the start of each billing month. Unused credits do not roll over to the next month.
          - generic [ref=f2e325]:
            - heading [level=3] [ref=f2e326]:
              - button "What payment methods do you accept?" [ref=f2e327] [cursor=pointer]
            - generic [ref=f2e333]:
              - heading [level=3] [ref=f2e334]: What payment methods do you accept?
              - generic [ref=f2e335]: We accept all major credit cards.
          - generic [ref=f2e336]:
            - heading [level=3] [ref=f2e337]:
              - button "What countries or regions are supported for individual plans?" [ref=f2e338] [cursor=pointer]
            - generic [ref=f2e344]:
              - heading [level=3] [ref=f2e345]: What countries or regions are supported for individual plans?
              - generic [ref=f2e346]: "Currently, you can purchase a Kiro paid plan with a billing address in Afghanistan, Algeria, Angola, Antigua and Barbuda, Argentina, Armenia, Aruba, Australia, Austria, Azerbaijan, Bangladesh, Belgium, Belize, Bermuda, Bhutan, Bolivia, Bosnia and Herzegovina, Botswana, Brazil, Brunei, Bulgaria, Burkina Faso, Burundi, Cambodia, Canada, Cape Verde, Cayman Islands, Central African Republic, Chad, Chile, China, Colombia, Comoros, Congo, Cook Islands, Costa Rica, Croatia, Curacao, Cyprus, Czech Republic, Democratic Republic of the Congo, Denmark, Djibouti, Dominica, Dominican Republic, East Timor, Ecuador, El Salvador, Equatorial Guinea, Eritrea, Estonia, Ethiopia, Falkland Islands, Fiji, Finland, France, French Guiana, Gabon, Gambia, Germany, Gibraltar, Greece, Greenland, Grenada, Guatemala, Guinea, Guinea-Bissau, Guyana, Haiti, Honduras, Hong Kong SAR, Hungary, India, Indonesia, Iraq, Ireland, Israel, Italy, Jamaica, Japan, Jordan, Kiribati, Kosovo, Latvia, Lebanon, Lesotho, Liberia, Libya, Lithuania, Luxembourg, Macao SAR, Macedonia, Madagascar, Malawi, Malaysia, Maldives, Mali, Malta, Mauritania, Mexico, Mongolia, Montenegro, Morocco, Mozambique, Myanmar, Namibia, Nauru, Nepal, Netherlands, New Zealand, Nicaragua, Niger, Norway, Palestinian Territories, Panama, Papua New Guinea, Paraguay, Philippines, Poland, Portugal, Qatar, Romania, Rwanda, Saint Kitts and Nevis, Saint Lucia, Saint Vincent and the Grenadines, Samoa, San Marino, Seychelles, Sierra Leone, Singapore, Slovakia, Slovenia, Solomon Islands, Somalia, South Africa, South Korea, South Sudan, Spain, Sri Lanka, Swaziland, Sweden, Switzerland, Tajikistan, Tanzania, Thailand, Togo, Tonga, Trinidad and Tobago, Tunisia, Turkmenistan, Tuvalu, United Arab Emirates, United Kingdom, United States of America, Uruguay, Uzbekistan, Vanuatu, Vatican City State, Venezuela, and Yemen. More countries or regions will be added soon. Model availability can vary by country or region. Kiro's model offerings align with each model provider's usage and geographic requirements for third-party services and interfaces. For more information, see each model provider's supported countries and regions, if relevant: [Anthropic](https://www.anthropic.com/supported-countries), Qwen, DeepSeek, Kimi, MiniMax, GLM."
          - generic [ref=f2e347]:
            - heading [level=3] [ref=f2e348]:
              - button "Is the Kiro on the web preview included in my current plan or will I be charged extra?" [ref=f2e349] [cursor=pointer]
            - generic [ref=f2e355]:
              - heading [level=3] [ref=f2e356]: Is the Kiro on the web preview included in my current plan or will I be charged extra?
              - generic [ref=f2e357]: Kiro on the web uses the existing credit model. Credits are consumed regardless of which interface the work runs on (IDE, CLI, or web). No separate charge for cloud compute. Available in preview to Kiro Pro, Pro+, Pro Max, and Power users.
          - generic [ref=f2e358]:
            - heading [level=3] [ref=f2e359]:
              - button "Will I be charged for Kiro powers?" [ref=f2e360] [cursor=pointer]
            - generic [ref=f2e366]:
              - heading [level=3] [ref=f2e367]: Will I be charged for Kiro powers?
              - generic [ref=f2e368]: No, there is no additional charge for using Kiro powers. All Kiro users can access and use Kiro powers.
          - generic [ref=f2e369]:
            - heading [level=3] [ref=f2e370]:
              - button "Is Kiro pricing different in GovCloud regions?" [ref=f2e371] [cursor=pointer]
            - generic [ref=f2e377]:
              - heading [level=3] [ref=f2e378]: Is Kiro pricing different in GovCloud regions?
              - generic [ref=f2e379]: Yes, Kiro pricing in [AWS GovCloud](https://docs.aws.amazon.com/govcloud-us/latest/UserGuide/govcloud-kiro.html) (US) Regions is approximately 20% higher than standard commercial region pricing. All Kiro subscription tiers (Pro, Pro+, Pro Max, and Power) are subject to this regional pricing adjustment when accessed through AWS GovCloud (US) Regions.
          - generic [ref=f2e380]:
            - heading [level=3] [ref=f2e381]:
              - button "Is the free tier supported for Kiro in GovCloud?" [ref=f2e382] [cursor=pointer]
            - generic [ref=f2e388]:
              - heading [level=3] [ref=f2e389]: Is the free tier supported for Kiro in GovCloud?
              - generic [ref=f2e390]: The Free tier is not available in the AWS GovCloud (US) Regions. Kiro in AWS GovCloud (US) requires a paid subscription plan (Pro, Pro+, Pro Max, or Power) and enterprise authentication via AWS IAM Identity Center.
