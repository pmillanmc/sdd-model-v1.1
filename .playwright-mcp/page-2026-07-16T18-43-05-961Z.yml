                    - cell "Yes" [ref=f4e116]
                    - cell "Yes" [ref=f4e117]
                  - row [ref=f4e118]:
                    - cell "Agent can run commands" [ref=f4e119]
                    - cell "Yes (with trusted commands policy)" [ref=f4e120]
                    - cell "Yes (with trusted commands policy)" [ref=f4e121]
                  - row [ref=f4e122]:
                    - cell "Review step before changes are applied" [ref=f4e123]
                    - cell "No, changes are applied immediately" [ref=f4e124]
                    - cell "Yes, you review a diff and accept or reject" [ref=f4e125]
                  - row [ref=f4e126]:
                    - cell "Revert capability" [ref=f4e127]
                    - cell [ref=f4e128]:
                      - text: Manual (via
                      - strong [ref=f4e129]: Revert all changes
                      - text: or checkpoints)
                    - cell "Automatic on rejection; also manual revert available" [ref=f4e130]
                  - row [ref=f4e131]:
                    - cell "Prevents writes to protected paths without approval" [ref=f4e132]
                    - cell "Yes" [ref=f4e133]
                    - cell "Yes" [ref=f4e134]
              - generic [ref=f4e135]:
                - heading "How supervised mode works" [level=3] [ref=f4e136]
                - link "Copy link to How supervised mode works section" [ref=f4e137] [cursor=pointer]:
                  - /url: "#how-supervised-mode-works"
              - paragraph [ref=f4e142]: In both modes, the agent writes file changes to disk during tool execution. In supervised mode, these writes are tagged for your review. After the agent's turn completes, Kiro checks for pending file changes and prompts you to accept or reject before continuing. If you reject, files revert to their pre-turn state.
              - paragraph [ref=f4e143]: "Kiro classifies the following operations as file-modifying. Any of these operations triggers a mandatory review prompt at the end of the agent's turn:"
              - table [ref=f4e145]:
                - rowgroup [ref=f4e146]:
                  - row [ref=f4e147]:
                    - columnheader "Operation" [ref=f4e148]
                    - columnheader "Description" [ref=f4e149]
                - rowgroup [ref=f4e150]:
                  - row [ref=f4e151]:
                    - cell "File creation or overwrite" [ref=f4e152]
                    - cell "Creating new files or replacing file contents" [ref=f4e153]
                  - row [ref=f4e154]:
                    - cell "Text replacement" [ref=f4e155]
                    - cell "Replacing specific text within a file" [ref=f4e156]
                  - row [ref=f4e157]:
                    - cell "Content append" [ref=f4e158]
                    - cell "Adding content to the end of a file" [ref=f4e159]
                  - row [ref=f4e160]:
                    - cell "File deletion" [ref=f4e161]
                    - cell "Removing a file from the workspace" [ref=f4e162]
                  - row [ref=f4e163]:
                    - cell "Code editing" [ref=f4e164]
                    - cell "Modifying code within a file" [ref=f4e165]
                  - row [ref=f4e166]:
                    - cell "Symbol rename" [ref=f4e167]
                    - cell "Renaming a variable, function, or class across files" [ref=f4e168]
                  - row [ref=f4e169]:
                    - cell "File relocation" [ref=f4e170]
                    - cell "Moving a file and updating its references" [ref=f4e171]
              - paragraph [ref=f4e172]: This review check is built into Kiro's workflow and cannot be skipped by the AI model. If a file-modifying operation ran during the turn, the approval prompt will appear.
              - paragraph [ref=f4e173]:
                - text: Shell commands follow a separate approval path. By default, all commands require your approval before execution (see
                - link "trusted commands" [ref=f4e174] [cursor=pointer]:
                  - /url: "#trusted-commands"
                - text: ). To maintain full oversight, keep your trusted commands list minimal and avoid broad wildcards.
              - generic [ref=f4e175]:
                - heading "What supervised mode provides" [level=3] [ref=f4e176]
                - link "Copy link to What supervised mode provides section" [ref=f4e177] [cursor=pointer]:
                  - /url: "#what-supervised-mode-provides"
              - paragraph [ref=f4e182]: "When supervised mode is enabled, Kiro enforces the following behaviors for file-modifying operations:"
              - list [ref=f4e183]:
                - listitem [ref=f4e184]:
                  - strong [ref=f4e185]: "Turn-level review for file-modifying operations:"
                  - text: Every file-modifying operation listed above results in an approval prompt before changes are applied.
                - listitem [ref=f4e186]:
                  - strong [ref=f4e187]: "Automatic revert on rejection:"
                  - text: If you reject, files are restored to their exact state before the agent's turn began.
                - listitem [ref=f4e188]:
                  - strong [ref=f4e189]: "Protected path enforcement:"
                  - text: Writes to
                  - link "protected paths" [ref=f4e190] [cursor=pointer]:
                    - /url: "#protected-paths"
                  - text: require explicit approval before the write occurs, in both modes.
                - listitem [ref=f4e191]:
                  - strong [ref=f4e192]: "Command approval:"
                  - text: Unrecognized commands require your approval before execution, in both modes.
              - generic [ref=f4e193]:
                - heading "Scope and limitations" [level=3] [ref=f4e194]
                - link "Copy link to Scope and limitations section" [ref=f4e195] [cursor=pointer]:
                  - /url: "#scope-and-limitations"
              - paragraph [ref=f4e200]: Supervised mode reviews changes made through Kiro's file-editing operations. Other actions, such as shell commands you've added to your trusted list, follow their own approval policy. Supervised mode does not restrict which files the agent can read, which commands it can suggest, or what network access it has.
              - paragraph [ref=f4e201]: "To maintain full oversight of your environment:"
              - list [ref=f4e202]:
                - listitem [ref=f4e203]:
                  - text: Keep your
                  - link "trusted commands" [ref=f4e204] [cursor=pointer]:
                    - /url: "#trusted-commands"
                  - text: list minimal and avoid broad wildcards.
                - listitem [ref=f4e205]:
                  - text: Use
                  - link "protected paths" [ref=f4e206] [cursor=pointer]:
                    - /url: "#protected-paths"
                  - text: to require approval for writes to sensitive locations.
                - listitem [ref=f4e207]:
                  - text: Use workspace isolation and credential scoping as described in
                  - link "best practices" [ref=f4e208] [cursor=pointer]:
                    - /url: "#best-practices"
                  - text: .
              - generic [ref=f4e209]:
                - heading "Autopilot mode (default)" [level=3] [ref=f4e210]
                - link "Copy link to Autopilot mode default section" [ref=f4e211] [cursor=pointer]:
                  - /url: "#autopilot-mode-default"
              - paragraph [ref=f4e216]: "In Autopilot mode, Kiro works autonomously:"
              - list [ref=f4e217]:
                - listitem [ref=f4e218]: Kiro executes multiple steps without requiring approval for each one.
                - listitem [ref=f4e219]: Kiro makes decisions based on its understanding of your requirements.
                - listitem [ref=f4e220]: You can toggle autopilot on/off in the chat interface.
                - listitem [ref=f4e221]: Changes are written and applied immediately. You can review them after the fact.
                - listitem [ref=f4e222]:
                  - text: You can interrupt at any time and revert changes via
                  - strong [ref=f4e223]: Revert all changes
                  - text: or
                  - link "checkpoints" [ref=f4e224] [cursor=pointer]:
                    - /url: /docs/chat/checkpoints
                  - text: .
              - generic [ref=f4e225]:
                - heading "Supervised mode" [level=3] [ref=f4e226]
                - link "Copy link to Supervised mode section" [ref=f4e227] [cursor=pointer]:
                  - /url: "#supervised-mode"
              - paragraph [ref=f4e232]: "In Supervised mode, Kiro works interactively, pausing for your review after each turn:"
              - list [ref=f4e233]:
                - listitem [ref=f4e234]: After the agent modifies files, it pauses and presents a diff for your review.
                - listitem [ref=f4e235]: You can accept individual changes (hunk-level granularity) or reject them to revert.
                - listitem [ref=f4e236]: The agent asks clarifying questions when needed.
                - listitem [ref=f4e237]: To reduce interruptions, consecutive edits to the same file may be batched.
              - paragraph [ref=f4e238]: Supervised mode is best suited for situations where you want to closely review agent output. For example, when working in an unfamiliar codebase, making changes to critical paths, or onboarding a new team member to agent-assisted workflows.
              - generic [ref=f4e239]:
                - heading "Choosing the right mode" [level=3] [ref=f4e240]
                - link "Copy link to Choosing the right mode section" [ref=f4e241] [cursor=pointer]:
                  - /url: "#choosing-the-right-mode"
              - paragraph [ref=f4e246]:
                - text: Use
                - strong [ref=f4e247]: Autopilot
                - text: when you trust the task scope and want the agent to work efficiently without interruption. Use
                - strong [ref=f4e248]: Supervised
                - text: when you want to review each set of changes before they persist. In both cases, apply the security controls described in
                - link "best practices" [ref=f4e249] [cursor=pointer]:
                  - /url: "#best-practices"
                - text: to protect sensitive files, credentials, and infrastructure.
              - paragraph [ref=f4e250]:
                - text: When operating in either mode, you can view individual or all file changes made by the agent by selecting
                - strong [ref=f4e251]: View all changes
                - text: in the
                - strong [ref=f4e252]: Chat
                - text: module. You can also select
                - strong [ref=f4e253]: Revert all changes
                - text: or revert to a
                - link "checkpoint" [ref=f4e254] [cursor=pointer]:
                  - /url: /docs/chat/checkpoints
                - text: to restore your files to their previous state.
              - generic [ref=f4e255]:
                - heading "Trusted commands" [level=2] [ref=f4e256]
                - link "Copy link to Trusted commands section" [ref=f4e257] [cursor=pointer]:
                  - /url: "#trusted-commands"
              - paragraph [ref=f4e262]:
                - text: By default, Kiro requires approval before running any command. You can create your own trusted commands list by searching for
                - strong [ref=f4e263]: "Kiro Agent: Trusted Commands"
                - text: in your settings.
              - paragraph [ref=f4e264]: "Kiro uses simple string prefix matching to determine if a command should be automatically trusted:"
              - list [ref=f4e265]:
                - listitem [ref=f4e266]:
                  - strong [ref=f4e267]: Exact matching
                  - text: ": Commands must match exactly (e.g.,"
                  - code [ref=f4e268]: npm install
                  - text: )
                - listitem [ref=f4e269]:
                  - strong [ref=f4e270]: Wildcard matching
                  - text: ": Use"
                  - code [ref=f4e271]: "*"
                  - text: to trust command variations (e.g.,
                  - code [ref=f4e272]: npm *
                  - text: trusts all npm commands)
                - listitem [ref=f4e273]:
                  - strong [ref=f4e274]: Universal trust
                  - text: ": Use"
                  - code [ref=f4e275]: "*"
                  - text: alone to trust all commands (use with extreme caution)
              - paragraph [ref=f4e276]: The system treats entire commands as single strings and only checks if they start with trusted patterns. It does not analyze command structure, chains, or special characters, putting full responsibility on you to carefully configure trusted patterns.
              - generic [ref=f4e277]:
                - heading "Protected paths" [level=2] [ref=f4e278]
                - link "Copy link to Protected paths section" [ref=f4e279] [cursor=pointer]:
                  - /url: "#protected-paths"
              - paragraph [ref=f4e284]: Kiro requires explicit approval before writing to certain protected paths, preventing unintended modifications to sensitive workspace configuration files. This applies in both Autopilot and Supervised mode — when the agent attempts to create or modify a file matching a protected pattern, you see a confirmation prompt and the change is not applied until you approve it. If you decline, the agent skips the write and continues with the rest of the task.
              - generic [ref=f4e285]:
                - heading "Protected path patterns" [level=3] [ref=f4e286]
                - link "Copy link to Protected path patterns section" [ref=f4e287] [cursor=pointer]:
                  - /url: "#protected-path-patterns"
              - paragraph [ref=f4e292]: "The following path patterns are protected:"
              - table [ref=f4e294]:
                - rowgroup [ref=f4e295]:
                  - row [ref=f4e296]:
                    - columnheader "Pattern" [ref=f4e297]
                    - columnheader "Match type" [ref=f4e298]
                    - columnheader "Description" [ref=f4e299]
                - rowgroup [ref=f4e300]:
                  - row [ref=f4e301]:
                    - cell [ref=f4e302]:
                      - code [ref=f4e303]: .vscode/
                    - cell "Path contains" [ref=f4e304]
