          - heading "Privacy and security" [level=1] [ref=f4e61]
          - generic [ref=f4e62]:
            - generic [ref=f4e63]:
              - paragraph [ref=f4e64]: Kiro is an AWS application that works as a standalone agentic IDE. Kiro's security framework is built around AWS's security infrastructure and follows practices to protect your development environment and data. Cloud security at AWS is the highest priority. As an AWS customer, you benefit from a data center and network architecture that is built to meet the requirements of the most security-sensitive organizations.
              - paragraph [ref=f4e65]:
                - text: Security is a shared responsibility between AWS and you. The
                - link "shared responsibility model" [ref=f4e66] [cursor=pointer]:
                  - /url: https://aws.amazon.com/compliance/shared-responsibility-model/
                - text: "describes this as security of the cloud and security in the cloud:"
              - list [ref=f4e67]:
                - listitem [ref=f4e68]:
                  - paragraph [ref=f4e69]:
                    - text: Security of the cloud – AWS is responsible for protecting the infrastructure that runs AWS services in the AWS Cloud. AWS also provides you with services that you can use securely. Third-party auditors regularly test and verify the effectiveness of our security as part of the
                    - link "AWS Compliance Programs" [ref=f4e70] [cursor=pointer]:
                      - /url: https://aws.amazon.com/compliance/programs/
                    - text: . To learn about the compliance programs that apply to Kiro, see
                    - link "AWS Services in Scope by Compliance Program" [ref=f4e71] [cursor=pointer]:
                      - /url: https://aws.amazon.com/compliance/services-in-scope/
                    - text: .
                - listitem [ref=f4e72]:
                  - paragraph [ref=f4e73]: Security in the cloud – Your responsibility is determined by the AWS service that you use. You are also responsible for other factors including the sensitivity of your data, your company’s requirements, and applicable laws and regulations
              - paragraph [ref=f4e74]: This documentation helps you understand how to apply the shared responsibility model when using Kiro. It shows you how to configure Kiro to meet your security and compliance objectives. You also learn how to use other AWS services that help you to monitor and secure your Kiro resources.
              - generic [ref=f4e75]:
                - heading "URL fetching" [level=2] [ref=f4e76]
                - link "Copy link to Url fetching section" [ref=f4e77] [cursor=pointer]:
                  - /url: "#url-fetching"
              - paragraph [ref=f4e82]: In the Kiro chat module, you can paste a specific URL for your device to fetch and use it as context to help Kiro answer your query or solve your task. You are responsible for the URL content that you fetch and ensuring that your use complies with any applicable third-party terms and laws.
              - generic [ref=f4e83]:
                - heading "Autopilot versus supervised mode" [level=2] [ref=f4e84]
                - link "Copy link to Autopilot versus supervised mode section" [ref=f4e85] [cursor=pointer]:
                  - /url: "#autopilot-versus-supervised-mode"
              - paragraph [ref=f4e90]: "Kiro offers two interaction modes, Autopilot and Supervised, that control how you review agent actions. Both modes grant the agent the same capabilities: creating, modifying, searching, and deleting files in your codebase and running commands that impact the filesystem. The difference is the review workflow, not the underlying permissions or access scope."
              - note "Note" [ref=f4e91]:
                - strong [ref=f4e95]: Warning
                - paragraph [ref=f4e97]:
                  - strong [ref=f4e98]: Supervised mode is a code review workflow, not a security control.
                  - text: It is designed to help you review and approve agent-generated changes. It does not function as a sandbox, isolation boundary, or access control mechanism. To restrict what the agent can access or modify, use
                  - link "protected paths" [ref=f4e99] [cursor=pointer]:
                    - /url: "#protected-paths"
                  - text: ","
                  - link "trusted commands" [ref=f4e100] [cursor=pointer]:
                    - /url: "#trusted-commands"
                  - text: ", workspace isolation, and credential scoping as described in"
                  - link "best practices" [ref=f4e101] [cursor=pointer]:
                    - /url: "#best-practices"
                  - text: .
              - table [ref=f4e103]:
                - rowgroup [ref=f4e104]:
                  - row [ref=f4e105]:
                    - columnheader "Capability" [ref=f4e106]
                    - columnheader "Autopilot" [ref=f4e107]
                    - columnheader "Supervised" [ref=f4e108]
                - rowgroup [ref=f4e109]:
                  - row [ref=f4e110]:
                    - cell "Agent can read files" [ref=f4e111]
                    - cell "Yes" [ref=f4e112]
                    - cell "Yes" [ref=f4e113]
                  - row [ref=f4e114]:
