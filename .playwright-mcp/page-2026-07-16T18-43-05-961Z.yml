                    - cell "Exact basename" [ref=f4e336]
                    - cell "MCP server configuration" [ref=f4e337]
                  - row [ref=f4e338]:
                    - cell [ref=f4e339]:
                      - code [ref=f4e340]: .kiroignore
                    - cell "Exact basename" [ref=f4e341]
                    - cell "Kiro ignore rules" [ref=f4e342]
              - generic [ref=f4e343]:
                - heading "Match types" [level=3] [ref=f4e344]
                - link "Copy link to Match types section" [ref=f4e345] [cursor=pointer]:
                  - /url: "#match-types"
              - list [ref=f4e350]:
                - listitem [ref=f4e351]:
                  - strong [ref=f4e352]: Path contains
                  - text: — Matches if the pattern appears anywhere in the file path. For example,
                  - code [ref=f4e353]: .vscode/
                  - text: matches both
                  - code [ref=f4e354]: .vscode/settings.json
                  - text: and
                  - code [ref=f4e355]: .vscode/extensions.json
                  - text: .
                - listitem [ref=f4e356]:
                  - strong [ref=f4e357]: Exact basename
                  - text: — Matches if the filename (the last segment of the path) exactly equals the pattern. For example,
                  - code [ref=f4e358]: mcp.json
                  - text: matches
                  - code [ref=f4e359]: project/mcp.json
                  - text: but not
                  - code [ref=f4e360]: mcp.json.bak
                  - text: .
              - paragraph [ref=f4e361]: When a match is detected, Kiro pauses and displays a confirmation prompt. The file is not written until you approve.
              - generic [ref=f4e362]:
                - heading "Best practices" [level=2] [ref=f4e363]
                - link "Copy link to Best practices section" [ref=f4e364] [cursor=pointer]:
                  - /url: "#best-practices"
              - paragraph [ref=f4e369]: Kiro provides a number of security features to consider as you develop and implement your own security policies. The following best practices are general guidelines and don’t represent a complete security solution. Because these best practices might not be appropriate or sufficient for your environment, treat them as helpful considerations rather than prescriptions.
              - generic [ref=f4e370]:
                - heading "Protecting your resources" [level=3] [ref=f4e371]
                - link "Copy link to Protecting your resources section" [ref=f4e372] [cursor=pointer]:
                  - /url: "#protecting-your-resources"
              - paragraph [ref=f4e377]: "When using GitHub or Google authentication with Kiro, be aware that the Kiro agent operates within your local environment and may access:"
              - list [ref=f4e378]:
                - listitem [ref=f4e379]: Local files and repositories
                - listitem [ref=f4e380]: Environment variables
                - listitem [ref=f4e381]: AWS credentials stored in your environment
                - listitem [ref=f4e382]: Other configuration files with sensitive information
              - generic [ref=f4e383]:
                - heading "Recommendations" [level=3] [ref=f4e384]
                - link "Copy link to Recommendations section" [ref=f4e385] [cursor=pointer]:
                  - /url: "#recommendations"
              - list [ref=f4e390]:
                - listitem [ref=f4e391]:
                  - strong [ref=f4e392]: Workspace Isolation
                  - list [ref=f4e393]:
                    - listitem [ref=f4e394]: Keep sensitive projects in separate workspaces
                    - listitem [ref=f4e395]: Use .gitignore to prevent access to sensitive files
                    - listitem [ref=f4e396]: Consider using workspace trust features in your IDE
                - listitem [ref=f4e397]:
                  - strong [ref=f4e398]: Use a Clean Environment
                  - list [ref=f4e399]:
                    - listitem [ref=f4e400]: Consider creating a dedicated user account or container environment for Kiro
                    - listitem [ref=f4e401]: Limit access to only the repositories and resources needed for your current project
                - listitem [ref=f4e402]:
                  - strong [ref=f4e403]: Manage AWS Credentials Carefully
                  - list [ref=f4e404]:
                    - listitem [ref=f4e405]: Use temporary credentials with appropriate permissions
                    - listitem [ref=f4e406]: Consider using AWS named profiles to isolate Kiro's access
                    - listitem [ref=f4e407]: For sensitive work, remove AWS credentials from your environment when not needed
                - listitem [ref=f4e408]:
                  - strong [ref=f4e409]: Repository Access Control
                  - list [ref=f4e410]:
                    - listitem [ref=f4e411]: When using GitHub authentication, review which repositories Kiro can access
                    - listitem [ref=f4e412]: Use repository-specific access tokens when possible
                    - listitem [ref=f4e413]: Regularly audit access permissions
              - generic [ref=f4e414]:
                - heading "Remote extensions security" [level=2] [ref=f4e415]
                - link "Copy link to Remote extensions security section" [ref=f4e416] [cursor=pointer]:
                  - /url: "#remote-extensions-security"
              - note "Note" [ref=f4e421]:
                - strong [ref=f4e425]: Warning
                - paragraph [ref=f4e427]:
                  - strong [ref=f4e428]: Security Note
                  - text: ": Using remote extensions opens a connection between your local machine and the remote machine. Only connect to secure remote machines that you trust and that are owned by a party whom you trust. A compromised remote could use the connection to execute code on your local machine. Third-party extensions including remote extensions are not developed, maintained, or managed by Kiro. We are not responsible for third-party extensions and cannot guarantee their stability, compatibility, or ongoing support."
              - paragraph [ref=f4e429]:
                - text: Kiro supports Open VSX extensions, including remote SSH extensions (the community-maintained
                - link "Open Remote - SSH" [ref=f4e430] [cursor=pointer]:
                  - /url: https://open-vsx.org/extension/jeanp413/open-remote-ssh
