                  - row [ref=f4e306]:
                    - cell [ref=f4e307]:
                      - code [ref=f4e308]: vscode~
                    - cell "Path contains" [ref=f4e309]
                    - cell "VS Code backup and recovery files" [ref=f4e310]
                  - row [ref=f4e311]:
                    - cell [ref=f4e312]:
                      - code [ref=f4e313]: .git/
                    - cell "Path contains" [ref=f4e314]
                    - cell [ref=f4e315]:
                      - text: Files inside the
                      - code [ref=f4e316]: .git
                      - text: directory
                  - row [ref=f4e317]:
                    - cell [ref=f4e318]:
                      - code [ref=f4e319]: git~
                    - cell "Path contains" [ref=f4e320]
                    - cell "Git lock and backup files" [ref=f4e321]
                  - row [ref=f4e322]:
                    - cell [ref=f4e323]:
                      - code [ref=f4e324]: .code-workspace
                    - cell "Path contains" [ref=f4e325]
                    - cell "Multi-root workspace files" [ref=f4e326]
                  - row [ref=f4e327]:
                    - cell [ref=f4e328]:
                      - code [ref=f4e329]: .git
                    - cell "Exact basename" [ref=f4e330]
                    - cell [ref=f4e331]:
                      - text: The
                      - code [ref=f4e332]: .git
                      - text: directory or submodule file itself
                  - row [ref=f4e333]:
                    - cell [ref=f4e334]:
