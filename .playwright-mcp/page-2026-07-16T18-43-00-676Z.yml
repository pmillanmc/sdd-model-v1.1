                  - strong [ref=f3e215]: Build design docs
                  - text: with sequence diagrams and architecture plans
                - listitem [ref=f3e216]:
                  - strong [ref=f3e217]: Track implementation progress
                  - text: across discrete tasks
                - listitem [ref=f3e218]:
                  - strong [ref=f3e219]: Collaborate effectively
                  - text: between product and engineering teams
