        - generic [ref=e1610]:
          - heading "Common questions" [level=2] [ref=e1611]
          - generic [ref=e1613]:
            - generic [ref=e1614]:
              - heading [level=3] [ref=e1615]:
                - button "What is Kiro?" [ref=e1616] [cursor=pointer]
              - generic [ref=e1622]:
                - heading [level=3] [ref=e1623]: What is Kiro?
                - generic [ref=e1624]: Kiro is an agentic AI with an [IDE](/docs/), [CLI](/docs/cli/), and [web interface](/docs/web/) that helps you go from prototype to production. From simple to complex tasks, Kiro works alongside you to turn prompts into detailed specs, then into working code, docs, and tests—so what you build is exactly what you want and ready to share with your team. Kiro’s agents help you solve challenging problems and automate tasks like generating documentation and unit tests.
            - generic [ref=e1625]:
              - heading [level=3] [ref=e1626]:
                - button "What is spec-driven development? How is it different from vibe coding?" [ref=e1627] [cursor=pointer]
              - generic [ref=e1633]:
                - heading [level=3] [ref=e1634]: What is spec-driven development? How is it different from vibe coding?
                - generic [ref=e1635]: "Developing with specs keeps the fun of vibe coding, but fixes some of its limitations: vibe coding can require too much guidance on complex tasks or when building on top of large codebases, and it can misinterpret context. When implementing a task with vibe coding, it’s difficult to keep track of all the decisions that were made along the way, and document them for your team. By using specs, Kiro works alongside you to define requirements, system design, and tasks to be implemented before writing any code. This approach explicitly documents the reasoning and implementation decisions, so Kiro can implement more complex tasks in fewer shots."
            - generic [ref=e1636]:
              - heading [level=3] [ref=e1637]:
                - button "How can I get started with Kiro?" [ref=e1638] [cursor=pointer]
              - generic [ref=e1644]:
                - heading [level=3] [ref=e1645]: How can I get started with Kiro?
                - generic [ref=e1646]: Kiro works as an agent in the [IDE](/docs/), with a [CLI](/docs/cli/), or in a [web browser](/docs/web/). [Download](/downloads/) the installer for your operating system, or [sign in](https://app.kiro.dev/agent) to use it with a paid account on the web, and log in with GitHub, Google, AWS Builder ID, or AWS IAM Identity Center. You do not need an AWS account to use Kiro. For more, see [documentation](/docs).
            - generic [ref=e1647]:
              - heading [level=3] [ref=e1648]:
                - button "What programming languages does Kiro support?" [ref=e1649] [cursor=pointer]
              - generic [ref=e1655]:
                - heading [level=3] [ref=e1656]: What programming languages does Kiro support?
                - generic [ref=e1657]: Kiro supports a variety of programming languages that developers use in their day to day work. This list includes, but is not limited to Python, Java, JavaScript, TypeScript, C#, Go, Rust, PHP, Ruby, Kotlin, C, C++, shell scripting, SQL, Scala, JSON, YAML, and HCL.
            - generic [ref=e1658]:
              - heading [level=3] [ref=e1659]:
                - button "Can I import settings from my existing IDE?" [ref=e1660] [cursor=pointer]
              - generic [ref=e1666]:
                - heading [level=3] [ref=e1667]: Can I import settings from my existing IDE?
                - generic [ref=e1668]: Kiro is based on Code OSS, so you can [import your VS Code settings, themes, and Open VSX compatible plugins](/docs/guides/migrating-from-vscode/) in the Kiro onboarding flow.
            - generic [ref=e1669]:
              - heading [level=3] [ref=e1670]:
                - button "How is Kiro on the web different from Kiro IDE and CLI?" [ref=e1671] [cursor=pointer]
              - generic [ref=e1677]:
                - heading [level=3] [ref=e1678]: How is Kiro on the web different from Kiro IDE and CLI?
                - generic [ref=e1679]: Kiro IDE is for active, local development with real-time agent collaboration. Kiro CLI is for terminal-based workflows, custom agents, and deployment pipelines. [Kiro on the web](/docs/web/) is for delegating and steering from the browser, with sessions that run in isolated cloud [sandboxes](/docs/web/sandbox/), keep going when you close your laptop, and coordinate changes across [GitHub](/docs/web/github/) and [GitLab](/docs/web/gitlab/) repos in a single session. All three modes ([autonomous](/docs/web/autonomous-mode/), [spec](/docs/web/specs/), and default) are available together in Kiro on the web. Autonomous mode and [cloud automations](/docs/web/automations/) are only available in Kiro on the web today. Use whichever Kiro interface fits the work; they work best together. [Steering files](/docs/web/steering/) and learnings carry across all three so context builds no matter where you work.
            - generic [ref=e1680]:
              - heading [level=3] [ref=e1681]:
                - button "What is an AI agent?" [ref=e1682] [cursor=pointer]
              - generic [ref=e1688]:
                - heading [level=3] [ref=e1689]: What is an AI agent?
                - generic [ref=e1690]: An agent is an AI system that can plan and execute multi-step tasks with some degree of autonomy. Unlike simple chatbots that respond to individual prompts, agents can break down complex tasks, make decisions about how to proceed, and take actions to accomplish goals.
