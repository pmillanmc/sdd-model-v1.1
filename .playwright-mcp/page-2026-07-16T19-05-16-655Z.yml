  - separator [ref=f4e297]
  - generic [ref=f4e298]:
    - generic [ref=f4e299]: Síntesis
    - heading "¿Se complementan o uno supera al otro?" [level=2] [ref=f4e300]
    - paragraph [ref=f4e301]: "El veredicto teórico: en qué capa opera cada uno y por qué eso define la respuesta."
    - generic [ref=f4e302]:
      - generic [ref=f4e303]:
        - paragraph [ref=f4e304]:
          - text: La pregunta correcta no es
          - strong [ref=f4e305]: "\"¿Kiro o SDD?\""
          - text: sino
          - strong [ref=f4e306]: "\"¿en qué capa estás comprando?\""
          - text: Kiro es un
          - emphasis [ref=f4e307]: producto de ejecución
          - text: ": empaqueta un flujo de trabajo (spec → design → task → código) dentro de un IDE con UX cuidada, paralelismo automático y respaldo de AWS. SDD es un"
          - emphasis [ref=f4e308]: framework de gobernanza
          - text: ": define las reglas del proceso y las hace cumplir de forma determinista, independientemente del IDE o del agente que se use. Esa diferencia de capa es lo que hace que la comparativa no sea simétrica."
        - paragraph [ref=f4e309]:
          - text: Donde Kiro supera a SDD es en
          - strong [ref=f4e310]: fricción de adopción
          - text: ". El flujo de tres fases con botones, el Quick Plan para prototipos, el status en tiempo real en el IDE, la distribución de políticas por MDM y el respaldo institucional de AWS son ventajas reales para equipos que necesitan estandarizar rápido con bajo costo de training. SDD requiere disciplina de proceso consciente: 22 comandos, artefactos intermedios obligatorios y un auditor que para el merge si detecta inconsistencias. Para un equipo sin esa cultura previa, la curva es alta."
        - paragraph [ref=f4e311]:
          - text: Donde SDD supera a Kiro de forma estructural es en
          - strong [ref=f4e312]: trazabilidad auditable y soberanía
          - text: . El auditor determinista
          - code [ref=f4e313]: sdd-audit.mjs
          - text: "no usa IA, corre en CI y falla el build si el proceso no se siguió. Kiro no tiene equivalente: Supervised mode es explícitamente un workflow de review, no un control de seguridad. Además, SDD procesa los artefactos donde el equipo elija — la cuenta Claude del organismo —, sin pasar por AWS commercial, lo que elimina la pregunta de residencia de datos que Kiro abre para el contexto argentino."
        - paragraph [ref=f4e314]:
          - text: El escenario más interesante teóricamente es el
          - strong [ref=f4e315]: híbrido
          - text: ": usar Kiro como motor de ejecución (specs, tasks, paralelismo) y SDD como capa de gobernanza (features.yaml, DECISIONS.md, metrics/, audit en CI). Kiro generaría los artefactos; SDD verificaría que cumplen las reglas del proceso. La viabilidad depende de si el mapeo"
          - code [ref=f4e316]: .kiro/specs/*
          - text: →
          - code [ref=f4e317]: specs/*
          - text: es automatizable sin doble mantenimiento — algo que solo un piloto puede confirmar.
        - paragraph [ref=f4e318]: Para GDE específicamente, la gobernanza es el criterio no negociable. Un artefacto de aprobación que lo firma el LLM sin verificación externa es una brecha en ambos sistemas, pero SDD es el único que tiene la arquitectura — el auditor determinista, la cadena US-N → task → ticket, el registro ADR, los gates de prerequisito — para cerrarla progresivamente sin reemplazar la herramienta. En Kiro, esa capa no existe y no está en el roadmap público.
      - generic [ref=f4e319]:
        - generic [ref=f4e320]:
          - generic [ref=f4e321]: Kiro gana en
          - generic [ref=f4e322]:
            - strong [ref=f4e323]: Fricción de adopción.
            - text: IDE integrado, UX con botones, Quick Plan para prototipos rápidos, distribución de políticas por MDM, respaldo AWS con roadmap público y comunidad activa. Para equipos grandes que arrancan desde cero, es el camino de menor resistencia.
        - generic [ref=f4e324]:
          - generic [ref=f4e325]: SDD gana en
          - generic [ref=f4e326]:
            - strong [ref=f4e327]: Gobernanza ejecutable.
            - text: El único de los dos con un auditor determinista en CI que no usa IA y para el merge si el proceso no se siguió. Trazabilidad estructural US-N → task → ticket verificable por código, sin lock-in de plataforma, sin pregunta de soberanía de datos.
        - generic [ref=f4e328]:
          - generic [ref=f4e329]: La brecha que comparten
          - generic [ref=f4e330]:
            - strong [ref=f4e331]: El artefacto de aprobación lo produce el LLM.
            - text: En ninguno de los dos hay firma humana criptográfica en producción hoy. SDD tiene el diseño para cerrar esa brecha (SHA256 + artefactos firmados) — pero vive en un branch sin mergear. Eso es lo próximo a resolver para GDE.
