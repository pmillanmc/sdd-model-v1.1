# graph/domain.yaml — Grafo de dominio del proyecto
# Mantenido por /sdd-scan (genera/actualiza) y consultado por /sdd-refine,
# /sdd-generate y /sdd-implement ANTES de leer código.
#
# Propósito: dado un pedido ("implementar X"), el agente identifica acá el
# dominio afectado y lee SOLO los archivos listados — no escanea el codebase.
#
# Convención de nodos:
#   domains.<nombre>:
#     description: una línea de negocio
#     entities:    tipos/modelos del dominio
#     services:    hooks, servicios, lógica
#     components:  UI del dominio
#     storage:     dónde persiste
#     features:    ids de specs/_registry/features.yaml
#     depends_on:  otros dominios de los que depende
#     files:       rutas exactas (la clave del ahorro de tokens)

meta:
  generated_by: bootstrap manual # próxima actualización: /sdd-scan
  commit: null
  updated: 2026-06-10

domains:
  proyectos:
    description: "Gestión de proyectos y sus tareas con roles dev/po"
    entities: [Project, Task]
    services: [useProjects, useTasks, useLocalStorage]
    components:
      - RoleSelector
      - ProjectCard
      - ProjectList
      - ProjectDetail
      - ProjectForm
      - TaskList
      - TaskForm
    storage: localStorage
    features: [001-panel-proyectos]
    depends_on: []
    files:
      types: [app/src/types/index.ts]
      state: [app/src/AppContext.tsx]
      hooks:
        - app/src/hooks/useProjects.ts
        - app/src/hooks/useTasks.ts
        - app/src/hooks/useLocalStorage.ts
      components: [app/src/components/]
      tests:
        - app/src/hooks/useProjects.test.ts
        - app/src/hooks/useTasks.test.ts
        - app/src/hooks/useLocalStorage.test.ts
        - app/src/App.test.tsx
